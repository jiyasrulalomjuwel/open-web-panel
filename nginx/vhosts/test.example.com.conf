# OpenWebPanel -- test.example.com
server {
    listen 80;
    listen [::]:80;
    server_name test.example.com www.test.example.com;
    root /home/ubuntu/open-web-panel/homes/password/public_html;
    index index.html index.htm index.php;

    access_log ./nginx/logs/test.example.com.access.log;
    error_log ./nginx/logs/test.example.com.error.log;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # ACME HTTP-01 challenge (Let's Encrypt)
    location ^~ /.well-known/acme-challenge/ {
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host $host;
    }

    location ~ /\. {
        deny all;
    }

    location ~ /\.owp {
        deny all;
    }
}
